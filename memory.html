<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>神経衰弱 - ゲーム王国</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      text-align: center;
    }

    .title {
      font-family: "Cinzel", serif;
      font-size: 2.4rem;
      margin: 20px 0 10px;
    }

    .board {
      display: grid;
      gap: 10px;
      max-width: 600px;
      margin: 20px auto;
    }

    .card {
      width: 100%;
      aspect-ratio: 1 / 1.3;
      background: #222;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
    }

    .card.open {
      background: #fff;
      color: #000;
    }

    /* プレイヤー色 */
    .p1 {
      background: #2a4fff !important;
      color: #fff !important;
    }

    .p2 {
      background: #ff3b3b !important;
      color: #fff !important;
    }

    .score-area {
      margin-top: 20px;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>

  <h1 class="title">神経衰弱（対戦）</h1>

  <!-- カード枚数選択 -->
  <div id="setup">
    <p>カードのサイズを選んでください</p>
    <button class="btn" onclick="startGame(4)">4×4</button>
    <button class="btn" onclick="startGame(6)">6×6</button>
    <button class="btn" onclick="startGame(8)">8×8</button>
    <br><br>
    <button class="btn secondary" onclick="location.href='index.html'">タイトルに戻る</button>
  </div>

  <!-- ゲーム画面 -->
  <div id="game" style="display:none;">

    <div class="score-area">
      <div id="turn">Player1 の番</div>
      <div id="score">Player1: 0点　|　Player2: 0点</div>
    </div>

    <div id="board" class="board"></div>

    <div style="margin-top:20px;">
      <button class="btn secondary" onclick="location.href='index.html'">タイトルに戻る</button>
    </div>

  </div>

  <script src="common.js"></script>

  <script>
    let cards = [];
    let opened = [];
    let matched = [];
    let currentPlayer = 1;
    let score1 = 0;
    let score2 = 0;
    let size = 4;

    const boardEl = document.getElementById("board");
    const turnEl = document.getElementById("turn");
    const scoreEl = document.getElementById("score");

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function startGame(n) {
      size = n;
      document.getElementById("setup").style.display = "none";
      document.getElementById("game").style.display = "block";

      const total = n * n;
      const emojis = ["🍎","🍌","🍇","🍒","🍉","🥝","🍑","🍍","🥥","🍓","🍈","🍋","🍐","🥭","🍅","🥕","🌽","🍆","🥦","🥔"];

      cards = [];
      for (let i = 0; i < total / 2; i++) {
        cards.push(emojis[i], emojis[i]);
      }

      shuffle(cards);

      boardEl.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
      boardEl.innerHTML = "";

      opened = [];
      matched = [];
      currentPlayer = 1;
      score1 = 0;
      score2 = 0;

      cards.forEach((emoji, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.dataset.index = index;
        div.onclick = () => flipCard(index);
        boardEl.appendChild(div);
      });

      updateUI();
    }

    function flipCard(index) {
      if (opened.length === 2) return;
      if (matched.includes(index)) return;
      if (opened.includes(index)) return;

      opened.push(index);
      render();

      if (opened.length === 2) {
        setTimeout(checkMatch, 700);
      }
    }

    function checkMatch() {
      const [a, b] = opened;

      if (cards[a] === cards[b]) {
        matched.push(a, b);

        // 色をプレイヤーごとに変える
        const cardEls = document.querySelectorAll(".card");
        if (currentPlayer === 1) {
          cardEls[a].classList.add("p1");
          cardEls[b].classList.add("p1");
          score1++;
        } else {
          cardEls[a].classList.add("p2");
          cardEls[b].classList.add("p2");
          score2++;
        }

        // 同じならもう一度
      } else {
        // 違うならターン交代
        currentPlayer = currentPlayer === 1 ? 2 : 1;
      }

      opened = [];
      updateUI();
      render();

      if (matched.length === cards.length) {
        endGame();
      }
    }

    function render() {
      const cardEls = document.querySelectorAll(".card");

      cardEls.forEach((el, i) => {
        if (opened.includes(i) || matched.includes(i)) {
          el.classList.add("open");
          el.textContent = cards[i];
        } else {
          el.classList.remove("open");
          el.textContent = "";
        }
      });
    }

    function updateUI() {
      turnEl.textContent = `Player${currentPlayer} の番`;
      scoreEl.textContent = `Player1: ${score1}点　|　Player2: ${score2}点`;
    }

    function endGame() {
      let msg = "";
      if (score1 > score2) msg = "Player1 の勝ち！";
      else if (score2 > score1) msg = "Player2 の勝ち！";
      else msg = "引き分け！";

      turnEl.textContent = msg;
    }
  </script>

</body>
</html>
