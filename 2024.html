<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>2024 パズル</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      text-align: center;
    }

    .title {
      font-size: 2rem;
      margin: 20px 0 5px;
    }

    .score-box {
      display: inline-block;
      background: #222;
      padding: 8px 16px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #555;
    }

    .score-value {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .board-wrapper {
      position: relative;
      width: 340px;
      margin: 0 auto;
    }

    /* ★ 外枠だけ光る（明るさ少し強め） */
    .board-flash::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 12px;
      border: 4px solid rgba(255,255,255,0.28);
      animation: flashRing 0.28s ease-out;
      pointer-events: none;
    }

    @keyframes flashRing {
      0%   { opacity: 0.6; transform: scale(0.96); }
      100% { opacity: 0;   transform: scale(1.22); }
    }

    .board {
      width: 320px;
      height: 320px;
      background: #111;
      border-radius: 10px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: 10px;
      box-shadow: 0 0 20px #000;
      touch-action: none;
    }

    .cell {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: bold;
      transition: transform 0.15s ease, opacity 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    /* タイル色 */
    .n2    { background: #3c3c3c; color: #f5f5f5; }
    .n4    { background: #4a3c3c; color: #f5f5f5; }
    .n8    { background: #d17a22; color: #fff; }
    .n16   { background: #d95d39; color: #fff; }
    .n32   { background: #e63946; color: #fff; }
    .n64   { background: #ff4d6d; color: #fff; }
    .n128  { background: #ffb703; color: #fff; }
    .n256  { background: #f9c74f; color: #fff; }
    .n512  { background: #f9844a; color: #fff; }
    .n1024 { background: #f3722c; color: #fff; }
    .n2048 { background: #f94144; color: #fff; }

    /* 合体ポップ */
    .pop {
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* 揺れ */
    .shake {
      animation: shake 0.25s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translateX(-3px); }
      20%, 80% { transform: translateX(3px); }
      30%, 50%, 70% { transform: translateX(-5px); }
      40%, 60% { transform: translateX(5px); }
    }

    /* 光る */
    .flash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.35);
      animation: flash 0.2s ease;
    }

    @keyframes flash {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 衝撃波 */
    .impact::before {
      content: "";
      position: absolute;
      width: 180%;
      height: 180%;
      left: -40%;
      top: -40%;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      animation: impact 0.25s ease-out;
    }

    @keyframes impact {
      0% { transform: scale(0); opacity: 0.6; }
      100% { transform: scale(1); opacity: 0; }
    }

    /* 新タイル出現 */
    .new {
      animation: appear 0.25s ease;
    }

    @keyframes appear {
      0%   { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    #gameover {
      font-size: 1.4rem;
      color: #ff6b6b;
      height: 24px;
      margin-bottom: 10px;
    }

    .back-btn {
      margin-top: 10px;
      padding: 10px 24px;
      font-size: 1rem;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: #333;
      border-color: #777;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <h1 class="title">2024 パズル</h1>

  <div id="scoreBox" class="score-box">
    <div class="score-value" id="score">0</div>
  </div>

  <div id="gameover"></div>

  <div class="board-wrapper" id="boardWrapper">
    <div id="board" class="board"></div>
  </div>

  <button class="back-btn" onclick="location.href='index.html'">タイトルに戻る</button>

  <script>
    const SIZE = 4;
    let board = [];
    let score = 0;
    let gameOver = false;

    const boardEl = document.getElementById("board");
    const boardWrapper = document.getElementById("boardWrapper");
    const scoreEl = document.getElementById("score");
    const gameoverEl = document.getElementById("gameover");

    function init() {
      board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      score = 0;
      gameOver = false;
      gameoverEl.textContent = "";
      addTile();
      addTile();
      render();
    }

    function addTile() {
      const empty = [];
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          if (board[y][x] === 0) empty.push({ x, y });
        }
      }
      if (!empty.length) return;
      const { x, y } = empty[Math.floor(Math.random() * empty.length)];
      board[y][x] = Math.random() < 0.9 ? 2 : 4;
      board[y][x + "_new"] = true;
    }

    function render() {
      boardEl.innerHTML = "";
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const v = board[y][x];
          const cell = document.createElement("div");
          cell.className = "cell";
          if (v > 0) {
            cell.textContent = v;
            cell.classList.add("n" + v);

            if (board[y][x + "_pop"]) cell.classList.add("pop");
            if (board[y][x + "_shake"]) cell.classList.add("shake");
            if (board[y][x + "_flash"]) cell.classList.add("flash");
            if (board[y][x + "_impact"]) cell.classList.add("impact");
            if (board[y][x + "_new"]) cell.classList.add("new");
          }
          boardEl.appendChild(cell);

          delete board[y][x + "_pop"];
          delete board[y][x + "_shake"];
          delete board[y][x + "_flash"];
          delete board[y][x + "_impact"];
          delete board[y][x + "_new"];
        }
      }
      scoreEl.textContent = score;
    }

    function checkGameOver() {
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          if (board[y][x] === 0) return false;
        }
      }
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const v = board[y][x];
          if (x + 1 < SIZE && board[y][x + 1] === v) return false;
          if (y + 1 < SIZE && board[y + 1][x] === v) return false;
        }
      }
      gameoverEl.textContent = "ゲームオーバー！";
      gameOver = true;
      return true;
    }

    function move(dir) {
      if (gameOver) return;

      let moved = false;

      const combine = (line) => {
        const arr = line.filter(v => v !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i] === arr[i + 1]) {
            arr[i] *= 2;
            score += arr[i];

            arr[i + "_pop"] = true;
            arr[i + "_shake"] = true;
            arr[i + "_flash"] = true;
            arr[i + "_impact"] = true;

            arr[i + 1] = 0;
          }
        }
        return arr.filter(v => v !== 0);
      };

      if (dir === "left" || dir === "right") {
        for (let y = 0; y < SIZE; y++) {
          let row = board[y].slice();
          if (dir === "right") row.reverse();
          const combined = combine(row);
          while (combined.length < SIZE) combined.push(0);
          if (dir === "right") combined.reverse();
          if (!equal(board[y], combined)) {
            board[y] = combined;
            moved = true;
          }
        }
      } else {
        for (let x = 0; x < SIZE; x++) {
          let col = [];
          for (let y = 0; y < SIZE; y++) col.push(board[y][x]);
          if (dir === "down") col.reverse();
          const combined = combine(col);
          while (combined.length < SIZE) combined.push(0);
          if (dir === "down") combined.reverse();
          for (let y = 0; y < SIZE; y++) {
            if (board[y][x] !== combined[y]) {
              board[y][x] = combined[y];
              moved = true;
            }
          }
        }
      }

      if (moved) {
        addTile();
        render();

        /* ★ 外枠光エフェクト発動（控えめ＋明るさUP） */
        boardWrapper.classList.add("board-flash");
        setTimeout(() => boardWrapper.classList.remove("board-flash"), 280);

        checkGameOver();
      }
    }

    function equal(a, b) {
      return a.length === b.length && a.every((v, i) => v === b[i]);
    }

    /* PC操作 */
    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") move("left");
      if (e.key === "ArrowRight") move("right");
      if (e.key === "ArrowUp") move("up");
      if (e.key === "ArrowDown") move("down");
    });

    /* スマホスワイプ操作 */
    let startX = 0;
    let startY = 0;

    boardEl.addEventListener("touchstart", (e) => {
      const t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
    });

    boardEl.addEventListener("touchend", (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;

      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (Math.max(absX, absY) < 30) return;

      if (absX > absY) {
        if (dx > 0) move("right");
        else move("left");
      } else {
        if (dy > 0) move("down");
        else move("up");
      }
    });

    init();
  </script>
</body>
</html>
