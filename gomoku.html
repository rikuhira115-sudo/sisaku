<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>五目並べ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: #fff;
      text-align: center;
      font-family: "Segoe UI", sans-serif;
    }

    .title {
      font-size: 2rem;
      margin: 20px 0;
    }

    /* 豪華な碁盤 */
    .board {
      position: relative;
      margin: 20px auto;
      background: #c89b3c; /* 木目風 */
      border: 6px solid #000;
      box-shadow: 0 0 20px #000;
    }

    /* 線 */
    .line {
      position: absolute;
      background: #000;
    }

    .v-line {
      width: 2px;
      height: 100%;
    }

    .h-line {
      height: 2px;
      width: 100%;
    }

    /* 交点の小さな点（豪華に） */
    .dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #000;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.7;
    }

    /* 星（ほし） */
    .star {
      width: 12px;
      height: 12px;
      background: #000;
      border-radius: 50%;
      opacity: 0.9;
    }

    /* クリック判定用 */
    .point {
      position: absolute;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      cursor: pointer;
    }

    /* 石（豪華版） */
    .stone {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px rgba(0,0,0,0.5);
    }

    .black {
      background: radial-gradient(circle, #444, #000);
    }

    .white {
      background: radial-gradient(circle, #fff, #ccc);
      border: 1px solid #000;
    }

    .status {
      margin-top: 10px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* 戻るボタン */
    .back-btn {
      margin-top: 20px;
      padding: 12px 28px;
      font-size: 1.1rem;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: #333;
      border-color: #777;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <h1 class="title">五目並べ</h1>
  <div id="status" class="status"></div>

  <div id="board" class="board"></div>

  <button class="back-btn" onclick="location.href='index.html'">タイトルに戻る</button>

  <script>
    const SIZE = 15;
    const CELL = 30;

    const boardSize = (SIZE - 1) * CELL;

    let board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    let current = 1;
    let gameOver = false;

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");

    function init() {
      boardEl.style.width = boardSize + "px";
      boardEl.style.height = boardSize + "px";

      drawLines();
      drawDots();
      drawStars();
      drawPoints();
      updateStatus();
    }

    /* 線を描く（左右対称） */
    function drawLines() {
      for (let i = 0; i < SIZE; i++) {
        const v = document.createElement("div");
        v.className = "line v-line";
        v.style.left = (i * CELL) + "px";
        boardEl.appendChild(v);

        const h = document.createElement("div");
        h.className = "line h-line";
        h.style.top = (i * CELL) + "px";
        boardEl.appendChild(h);
      }
    }

    /* 全交点に小さな点を置く */
    function drawDots() {
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const d = document.createElement("div");
          d.className = "dot";
          d.style.left = (x * CELL) + "px";
          d.style.top = (y * CELL) + "px";
          boardEl.appendChild(d);
        }
      }
    }

    /* 星（ほし）を置く */
    function drawStars() {
      const stars = [
        [3, 3], [3, 11],
        [11, 3], [11, 11],
        [7, 7] // 中央
      ];

      for (const [x, y] of stars) {
        const s = document.createElement("div");
        s.className = "dot star";
        s.style.left = (x * CELL) + "px";
        s.style.top = (y * CELL) + "px";
        boardEl.appendChild(s);
      }
    }

    /* クリック判定用ポイント */
    function drawPoints() {
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const p = document.createElement("div");
          p.className = "point";
          p.style.left = (x * CELL) + "px";
          p.style.top = (y * CELL) + "px";
          p.onclick = () => placeStone(x, y);
          boardEl.appendChild(p);
        }
      }
    }

    /* 石を置く */
    function placeStone(x, y) {
      if (gameOver) return;
      if (board[y][x] !== 0) return;

      board[y][x] = current;

      const stone = document.createElement("div");
      stone.className = "stone " + (current === 1 ? "black" : "white");
      stone.style.left = (x * CELL) + "px";
      stone.style.top = (y * CELL) + "px";
      boardEl.appendChild(stone);

      if (checkWin(x, y)) {
        statusEl.textContent = (current === 1 ? "黒" : "白") + "の勝ち！";
        gameOver = true;
        return;
      }

      current = current === 1 ? 2 : 1;
      updateStatus();
    }

    /* 勝利判定 */
    function checkWin(x, y) {
      const dirs = [
        [1, 0], [0, 1], [1, 1], [1, -1]
      ];

      for (const [dx, dy] of dirs) {
        let count = 1;

        let nx = x + dx, ny = y + dy;
        while (board[ny] && board[ny][nx] === current) {
          count++; nx += dx; ny += dy;
        }

        nx = x - dx; ny = y - dy;
        while (board[ny] && board[ny][nx] === current) {
          count++; nx -= dx; ny -= dy;
        }

        if (count >= 5) return true;
      }
      return false;
    }

    function updateStatus() {
      statusEl.textContent = current === 1 ? "黒の番" : "白の番";
    }

    init();
  </script>

</body>
</html>
